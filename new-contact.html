<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact - EMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">EMS</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html" class="active">New Contact</a></li>
            <li><a href="view-contacts.html">View All Contacts</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Add New Contact</h2>
        <form id="contact-form" class="contact-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>ID Number</label>
                    <input type="text" id="idNumber" required placeholder="Enter Identification Number">
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required placeholder="Enter First Name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required placeholder="Enter Last Name">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male" required> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+2547-XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="Enter Email">
                </div>
                <div class="form-group full">
                    <label>Address</label>
                    <textarea id="address" rows="2" placeholder="Enter Address"></textarea>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="">-- Select Department --</option>
                        <option value="IT">IT</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="Operations">Operations</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <select id="position" required>
                        <option value="">-- Select Position --</option>
                        <option value="Manager">Manager</option>
                        <option value="Senior Developer">Senior Developer</option>
                        <option value="Developer">Developer</option>
                        <option value="Analyst">Analyst</option>
                        <option value="Clerk">Clerk</option>
                        <option value="Intern">Intern</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn primary full">Submit Contact</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2025 Employee Management System</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
