<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Contacts - EMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">EMS</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html">New Contact</a></li>
            <li><a href="view-contacts.html" class="active">View All Contacts</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>All Employees</h2>
        <div class="table-container">
            <table id="contacts-table">
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Department</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Edit Employee</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-idNumber">
                <div class="form-group"><label>First Name</label><input type="text" id="edit-firstName"></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="edit-lastName"></div>
                <div class="form-group"><label>Gender</label>
                    <select id="edit-gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group"><label>Phone</label><input type="tel" id="edit-phone"></div>
                <div class="form-group"><label>Email</label><input type="email" id="edit-email"></div>
                <div class="form-group"><label>Address</label><textarea id="edit-address" rows="2"></textarea></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="edit-dob"></div>
                <div class="form-group"><label>Department</label>
                    <select id="edit-department">
                        <option value="IT">IT</option><option value="HR">HR</option><option value="Finance">Finance</option>
                        <option value="Marketing">Marketing</option><option value="Sales">Sales</option><option value="Operations">Operations</option>
                    </select>
                </div>
                <div class="form-group"><label>Position</label>
                    <select id="edit-position">
                        <option value="Manager">Manager</option><option value="Senior Developer">Senior Developer</option>
                        <option value="Developer">Developer</option><option value="Analyst">Analyst</option>
                        <option value="Clerk">Clerk</option><option value="Intern">Intern</option>
                    </select>
                </div>
                <button type="submit" class="btn primary">Save Changes</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Employee Management System</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
